name: Update Cattle Futures Data

on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cattle-futures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cattle futures extractor
        run: python extract_cattle_futures.py

      - name: Commit and push updated CSV files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/*.csv

          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
          else
            git commit -m "Update cattle futures data"
            git push
          fi
